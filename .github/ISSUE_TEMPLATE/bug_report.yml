name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS (Apple Silicon)
        - Linux
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How did you run the app?
      options:
        - Prebuilt binary (downloaded from release)
        - From source (start.sh / start.bat)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug. Include any error messages or unexpected behaviour.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the app
        2. …
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: false
