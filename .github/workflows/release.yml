name: Release binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create/upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: az-firewall-watch-linux
          - os: macos-latest # Apple Silicon / arm64
            artifact: az-firewall-watch-macos
          - os: windows-latest
            artifact: az-firewall-watch

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-build.txt

      - name: Build binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --name az-firewall-watch \
            --collect-all textual \
            --hidden-import azure.eventhub \
            --hidden-import azure.eventhub.aio \
            --hidden-import azure.eventhub._transport._pyamqp_transport \
            --add-data "fw_parser.py:." \
            --add-data "setup_wizard.py:." \
            main.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --name az-firewall-watch `
            --collect-all textual `
            --hidden-import azure.eventhub `
            --hidden-import azure.eventhub.aio `
            "--hidden-import" "azure.eventhub._transport._pyamqp_transport" `
            "--add-data" "fw_parser.py;." `
            "--add-data" "setup_wizard.py;." `
            main.py

      - name: Package artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            : # dist/az-firewall-watch.exe is already the correct name
          else
            cd dist && tar -czf "${{ matrix.artifact }}.tar.gz" az-firewall-watch && rm az-firewall-watch
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Download

            | Platform | File |
            |----------|------|
            | Linux (x86_64) | `az-firewall-watch-linux.tar.gz` |
            | macOS Apple Silicon | `az-firewall-watch-macos.tar.gz` |
            | Windows | `az-firewall-watch.exe` |

            ### First run on macOS
            ```bash
            tar -xzf az-firewall-watch-macos.tar.gz
            xattr -d com.apple.quarantine az-firewall-watch-macos   # remove Gatekeeper flag
            ./az-firewall-watch-macos
            ```

            ### First run on Linux
            ```bash
            chmod +x az-firewall-watch-linux
            ./az-firewall-watch-linux
            ```

            ### First run on Windows
            Double-click `az-firewall-watch-windows.exe` or run it from PowerShell.
            Windows SmartScreen may warn on first launch — click **More info → Run anyway**.
